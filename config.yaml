metrics:
  # Checks rate feed trading modes
  - source: BreakerBox.getRateFeedTradingMode(address rateFeed)(uint8)
    schedule: 0/10 * * * * *
    type: gauge
    chains: all
    variants:
      - [CELOUSD]
      - [CELOEUR]
      - [CELOBRL]
      - [USDCUSD]
      - [USDCBRL]
      - [EUROCEUR]
      - [USDTUSD]
      - [CELOXOF]
      - [EUROCXOF]
      - [EURXOF]
      - [KESUSD]
      - [PHPUSD]
      - [COPUSD]
      - [GHSUSD]
      - [GBPUSD]
      - [ZARUSD]
      - [CHFUSD]
      - [CADUSD]
      - [AUDUSD]
      - [JPYUSD]
      - [NGNUSD]
      - [EURUSD]
      - [BRLUSD]
      - [XOFUSD]

  # Checks for rate feed freshness
  - source: SortedOracles.isOldestReportExpired(address rateFeed)(bool,address)
    schedule: 0/10 * * * * *
    type: gauge
    chains: all
    variants:
      # Redstone feeds
      - [CELOUSD]
      - [CELOEUR]
      - [CELOBRL]
      - [USDCUSD]
      - [USDCEUR]
      - [USDCBRL]
      - [EUROCEUR]
      # Chainlink feeds - Legacy identifiers
      # Legacy identifiers
      - [USDTUSD]
      - [CELOXOF]
      - [CELOKES]
      - [KESUSD]
      - [EUROCXOF]
      - [EURXOF]
      # Chainlink feeds
      - [PHPUSD]
      - [COPUSD]
      - [GHSUSD]
      - [GBPUSD]
      - [ZARUSD]
      - [CHFUSD]
      - [CADUSD]
      - [AUDUSD]
      - [JPYUSD]
      - [NGNUSD]
      - [EURUSD]
      - [BRLUSD]
      - [XOFUSD]
      - [CELOPHP]
      - [CELOCOP]
      - [CELOGHS]
      - [CELOGBP]
      - [CELOZAR]
      - [CELOCHF]
      - [CELOCAD]
      - [CELOAUD]
      - [CELOJPY]
      - [CELONGN]
  # Checks if wallets or contracts of interest have enough CELO to pay for transactions
  - source: CELOToken.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: all
    variants:
      # Do signer wallets have enough CELO to pay for relay() transactions?
      - [RelayerSignerPHPUSD]
      - [RelayerSignerCOPUSD]
      - [RelayerSignerGHSUSD]
      - [RelayerSignerGBPUSD]
      - [RelayerSignerZARUSD]
      - [RelayerSignerCHFUSD]
      - [RelayerSignerCADUSD]
      - [RelayerSignerAUDUSD]
      - [RelayerSignerJPYUSD]
      - [RelayerSignerNGNUSD]
      - [RelayerSignerEURUSD]
      - [RelayerSignerBRLUSD]
      - [RelayerSignerXOFUSD]
      - [RelayerSignerCELOPHP]
      - [RelayerSignerCELOCOP]
      - [RelayerSignerCELOGHS]
      - [RelayerSignerCELOGBP]
      - [RelayerSignerCELOZAR]
      - [RelayerSignerCELOCHF]
      - [RelayerSignerCELOCAD]
      - [RelayerSignerCELOAUD]
      - [RelayerSignerCELOJPY]
      - [RelayerSignerCELONGN]
      - [RelayerSignerCELOXOF]
      - [RelayerSignerCELOKES]
      - [RelayerSignerEUROCXOF]
      - [RelayerSignerEURXOF]
      - [RelayerSignerKESUSD]
      - [RelayerSignerUSDTUSD]

      # Does the reserve have enough CELO for swap operations?
      - [Reserve]

  # Does the reserve have enough USDC for swap operations?
  - source: USDC.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]

  # Does the reserve have enough USDT for swap operations?
  - source: USDT.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]

  # Does the reserve have enough axlUSDC for swap operations?
  - source: axlUSDC.balanceOf(address owner)(uint256)
    schedule: 0/10 * * * * *
    type: gauge
    chains: [celo]
    variants:
      - [Reserve]
