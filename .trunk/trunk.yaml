# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - hadolint@2.14.0
    - actionlint@1.7.8
    - checkov@3.2.494
    - dotenv-linter@3.3.0
    - dustilock@1.2.0
    - eslint@9.39.1:
        ignore:
          - linters: [eslint]
            paths:
              - commitlint.config.mjs
    - git-diff-check
    - gitleaks@8.29.0
    - markdown-link-check@3.14.2
    - markdownlint@0.46.0
    - osv-scanner@2.2.4
    - oxipng@9.1.5
    - pre-commit-hooks@4.6.0
    - prettier@3.6.2
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - sort-package-json@3.4.0
    - taplo@0.10.0
    - terraform@1.1.0
    - terrascan@1.19.1:
        ignore:
          - linters: [terrascan]
            paths:
              - grafana-agent/Dockerfile
    - tflint@0.59.1
    - trufflehog@3.90.13
    - yamllint@1.37.1:
        config_path: .trunk/configs/.yamllint.yaml
actions:
  enabled:
    - test-pre-push
    - commitlint
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
  definitions:
    - id: todo-git-hook
      triggers:
        - git_hooks: [pre-push, pre-commit]
      run: npm run todo
    - id: test-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: npm run test
